<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings · Case League</title><link rel="stylesheet" href="css/global.css"></head><body><script src="js/shared.js"></script><script>guard();document.write(nav('settings'));</script><main class="wrap"><section class="hero"><div class="panel"><div class="panel-content"><div class="eyebrow">Settings</div><h1>Profile Settings</h1><p class="lead">No club names. Users use nicknames and can choose any country flag as profile picture.</p><label class="eyebrow">Nickname</label><input class="input" id="nick"><label class="eyebrow" style="display:block;margin-top:14px">Profile flag</label><select class="select" id="flagSel"></select><label class="eyebrow" style="display:block;margin-top:14px">Default tactic</label><select class="select" id="tac"><option value="balanced">Balanced</option><option value="counter">Counter Attack</option><option value="shoot">Shoot On Sight</option><option value="deep">Deep Defence</option><option value="possession">Possession</option><option value="allout">All Out Attack</option><option value="bus">Park The Bus</option></select><div class="btn-row"><button class="btn" onclick="saveSettings()">Save Settings</button><button class="btn danger" onclick="resetDemo()">Reset Demo</button></div></div></div></section></main><script>nick.value=State.username;Object.entries(flags).forEach(([c,f])=>flagSel.innerHTML+=`<option value="${f}">${f} ${c}</option>`);flagSel.value=State.flag||'🇬🇧';tac.value=State.defaultTactic||'balanced';function saveSettings(){State.username=nick.value.trim()||State.username;State.flag=flagSel.value;State.defaultTactic=tac.value;save();toast('Settings saved','good')}</script></body></html>
