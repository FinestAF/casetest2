<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketplace · Case League</title><link rel="stylesheet" href="css/global.css"></head><body><script src="js/shared.js"></script><script>guard();document.write(nav('marketplace'));</script><main class="wrap"><section class="hero"><div class="panel"><div class="panel-content"><div class="eyebrow">Marketplace</div><h1>Transfer Market</h1><p class="lead">Only tradeable and unlocked cards can be listed. Every purchase takes a 20% admin tax. Starter pack cards are untradeable.</p></div></div></section><section class="grid" id="market"></section></main><script>function seedMarket(){if(State.listings.length)return;for(let i=0;i<9;i++){const c=genCard(pick(['common','silver','silver','gold','gold','diamond']),true);State.listings.push({id:uid('listing'),card:c,price:c.value+rand(20,220),seller:pick(['AtlasFox','NileKing','SouthAce','GoldTempo']),date:Date.now()})}save()}function render(){market.innerHTML=State.listings.map(l=>`<div>${cardHTML(l.card,{actions:`<div class="status-row"><span class="tag">Seller ${l.seller}</span><span class="tag">Price ${l.price} LLD</span><span class="tag">Admin tax ${Math.round(l.price*.2)} LLD</span></div><button class="btn" onclick="buyListing('${l.id}');render()">Buy Now</button>`})}</div>`).join('')}seedMarket();render();</script></body></html>
