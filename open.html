
<html><head><link rel="stylesheet" href="css/style.css"></head>
<body>
<script src="js/app.js"></script>
<script>document.write(nav())</script>
<div class="container">
<div class="card">
<h1>Open Pack</h1>
<button class="btn" onclick="openPack()">Open Standard Pack</button>
</div>
<div class="grid" id="r"></div>
</div>
<script>
function openPack(){
if(state.packs<=0){alert('No packs');return;}
state.packs--;
let r=document.getElementById('r');
r.innerHTML='';
for(let i=0;i<6;i++){
let p=genPlayer();
state.inventory.push(p);
r.innerHTML += `<div class="player"><h3>${p.name}</h3><p>${p.country}</p><p>ATK ${p.attack}</p><p>DEF ${p.defence}</p><p>FLR ${p.flair}</p></div>`;
}
save();
}
</script>
</body></html>
