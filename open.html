<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open · Case League</title><link rel="stylesheet" href="css/global.css"></head><body><script src="js/shared.js"></script><script>guard();document.write(nav('open'));</script><main class="wrap"><section class="hero"><div class="panel"><div class="panel-content"><div class="eyebrow">Case Opening</div><h1>Open Packs</h1><p class="lead">Openings now deduct a pack, animate a spin track, reveal 6 real items, and save them to inventory. Starter packs are untradeable.</p><div class="btn-row"><button class="btn" onclick="doOpen('standard')">Open Standard Pack</button><button class="btn secondary" onclick="doOpen('rare')">Open Rare Pack</button><a class="btn secondary" href="store.html">Buy More</a></div></div></div></section><section class="card"><div class="card-content"><div class="spin-track"><div class="spin-row" id="spinRow"></div><div class="needle"></div></div><div id="openNote" class="notice" style="margin-top:18px">Ready. Choose a pack above.</div></div></section><section class="section"><div class="grid" id="lastResults"></div></section></main><script>function filler(){spinRow.innerHTML='';for(let i=0;i<30;i++){const p=genCard(rollRarity(i%3?'standard':'rare'),true);spinRow.innerHTML+=`<div class="spin-card rarity-${p.rarity}"><b>${p.flag}</b><span>${p.name}</span><small>${p.rarity}</small></div>`}}filler();function doOpen(kind){if(kind==='standard'&&((State.starterPacks||0)+(State.standardPacks||0))<=0){toast('No Standard packs','bad');return}if(kind==='rare'&&State.rarePacks<=0){toast('No Rare packs','bad');return}let tradeable=true;if(kind==='standard'){if((State.starterPacks||0)>0){State.starterPacks--;tradeable=false}else{State.standardPacks--;tradeable=true}} else {State.rarePacks--;tradeable=true}const items=openPack(kind,tradeable);State.inventory.push(...items);save();openNote.textContent='Opening... cards are being saved to your inventory.';filler();spinRow.style.transition='none';spinRow.style.transform='translateX(0)';setTimeout(()=>{spinRow.style.transition='transform 2.2s cubic-bezier(.12,.72,.12,1)';spinRow.style.transform='translateX(-1800px)'},50);setTimeout(()=>{lastResults.innerHTML=items.map((c,i)=>`<div class="reveal">${cardHTML(c)}</div>`).join('');openNote.textContent='Pack complete. All items saved to inventory.';toast('6 items added to inventory','good')},2300)}</script></body></html>
