<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Profiles · Case League</title><link rel="stylesheet" href="css/global.css"></head><body><script src="js/shared.js"></script><script>guard();document.write(nav('profiles'));</script><main class="wrap"><section class="hero"><div class="panel"><div class="panel-content"><div class="eyebrow">Player Search</div><h1>Search Nicknames</h1><p class="lead">Users can search each other's nicknames, see stats, inventory showcase and what league they are in.</p><input class="input" id="q" placeholder="Search nickname" oninput="render()"></div></div></section><section id="results"></section></main><script>function render(){const s=q.value.toLowerCase();const data=publicProfiles().filter(p=>p.nickname.toLowerCase().includes(s));results.innerHTML=data.map(p=>`<div class="search-result"><div><h3>${p.flag} ${p.nickname}</h3><p>${p.league} · ${p.record} · Inventory ${p.inventory}</p></div><button class="btn small secondary" onclick="toast('Demo profile opened: ${p.nickname}','good')">View</button></div>`).join('')||'<div class="notice">No profile found.</div>'}render()</script></body></html>
